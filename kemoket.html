<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けもケット 購入サポート</title>
<style>
/* オフライン対応: システムフォントを使用（Googleフォント不要） */
</style>
<style>
:root {
  --cream: #FFF8F0;
  --warm: #FFE8CC;
  --orange: #FF7A35;
  --orange-light: #FFB380;
  --brown: #5C3D2E;
  --brown-light: #8B6355;
  --green: #4CAF7D;
  --green-light: #A8E6C3;
  --pink: #FF6B9D;
  --yellow: #FFD93D;
  --text: #3A2418;
  --shadow: rgba(92,61,46,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}

/* ヘッダー */
header {
  background: linear-gradient(135deg, var(--orange) 0%, #FF9F5A 50%, var(--yellow) 100%);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 20px rgba(255,122,53,0.4);
  position: sticky;
  top: 0;
  z-index: 100;
}

header h1 {
  font-size: 1.4rem;
  font-weight: 900;
  color: white;
  text-shadow: 2px 2px 0 rgba(92,61,46,0.3);
  letter-spacing: 0.05em;
}

header h1 span {
  font-size: 0.8rem;
  display: block;
  font-weight: 500;
  opacity: 0.9;
}

.header-stats {
  display: flex;
  gap: 12px;
}

.stat-badge {
  background: rgba(255,255,255,0.3);
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: 20px;
  padding: 4px 12px;
  color: white;
  font-size: 0.8rem;
  font-weight: 700;
  backdrop-filter: blur(4px);
  cursor: pointer;
  transition: all 0.2s;
}
.stat-badge:hover { background: rgba(255,255,255,0.5); }

/* タブ */
.tabs {
  display: flex;
  background: var(--brown);
  padding: 0 16px;
  gap: 4px;
  overflow-x: auto;
}

.tab-btn {
  padding: 10px 18px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
}

.tab-btn.active {
  color: var(--yellow);
  border-bottom-color: var(--yellow);
}

/* メインコンテンツ */
.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

/* 検索エリア */
.search-bar {
  background: white;
  border-radius: 16px;
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  align-items: center;
  box-shadow: 0 2px 12px var(--shadow);
  margin-bottom: 12px;
}

.search-bar input {
  flex: 1;
  border: none;
  outline: none;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  background: none;
}

.search-bar input::placeholder { color: #BBA89A; }

/* フィルター */
.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.filter-btn {
  padding: 6px 14px;
  background: white;
  border: 2px solid var(--warm);
  border-radius: 20px;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--brown-light);
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover, .filter-btn.active {
  background: var(--orange);
  border-color: var(--orange);
  color: white;
}

/* サークルカード */
.circles-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.circle-card {
  background: white;
  border-radius: 16px;
  padding: 14px 16px;
  box-shadow: 0 2px 10px var(--shadow);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
  transition: transform 0.2s, box-shadow 0.2s;
  border-left: 4px solid transparent;
}

.circle-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--shadow);
}

.circle-card.favorited { border-left-color: var(--pink); }
.circle-card.has-memo { border-left-color: var(--green); }
.circle-card.favorited.has-memo { border-left-color: var(--orange); }

.circle-block {
  background: var(--orange);
  color: white;
  font-weight: 900;
  font-size: 0.85rem;
  width: 52px;
  height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  letter-spacing: -0.02em;
}

.circle-info { min-width: 0; }
.circle-name {
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.circle-rep {
  font-size: 0.78rem;
  color: var(--brown-light);
}

.circle-links {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}

.link-icon {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  text-decoration: none;
  transition: transform 0.2s;
}
.link-icon:hover { transform: scale(1.2); }
.link-x { background: #000; color: white; }
.link-pix { background: #00AAEE; color: white; }
.link-web { background: var(--green); color: white; }

.circle-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}

.btn-fav {
  background: none;
  border: 2px solid var(--warm);
  border-radius: 10px;
  width: 36px;
  height: 36px;
  cursor: pointer;
  font-size: 1.1rem;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-fav:hover { border-color: var(--pink); }
.btn-fav.active { background: var(--pink); border-color: var(--pink); }

.btn-memo {
  background: none;
  border: 2px solid var(--warm);
  border-radius: 10px;
  width: 36px;
  height: 36px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-memo:hover { border-color: var(--green); }
.btn-memo.active { background: var(--green); border-color: var(--green); }

/* メモパネル */
.memo-panel {
  display: none;
  background: #F0FFF6;
  border: 2px dashed var(--green-light);
  border-radius: 12px;
  padding: 10px;
  margin-top: 8px;
  grid-column: 1 / -1;
}

.memo-panel.open { display: block; }

.memo-panel textarea {
  width: 100%;
  border: none;
  background: none;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  resize: none;
  outline: none;
  min-height: 60px;
}

.memo-panel .ai-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 6px 12px;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 6px;
  transition: opacity 0.2s;
}
.memo-panel .ai-btn:hover { opacity: 0.85; }
.memo-panel .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.ai-result {
  background: white;
  border-radius: 8px;
  padding: 8px 10px;
  margin-top: 6px;
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--text);
  border-left: 3px solid #764ba2;
}

/* 配置図タブ */
.block-map {
  background: white;
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 2px 12px var(--shadow);
  margin-bottom: 12px;
}

.block-map h3 {
  font-size: 0.85rem;
  color: var(--brown-light);
  margin-bottom: 10px;
}

.map-legend {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.75rem;
  color: var(--brown-light);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
}

.block-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.block-cell {
  background: var(--warm);
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 8px 4px 6px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.block-cell:hover {
  background: var(--orange-light);
  border-color: var(--orange);
}

.block-cell.selected {
  background: var(--orange);
  border-color: var(--brown);
}

.block-cell .block-letter {
  font-weight: 900;
  font-size: 1.3rem;
  line-height: 1;
}

.block-cell.selected .block-letter { color: white; }

.block-cell-badges {
  display: flex;
  gap: 3px;
  margin-top: 4px;
  flex-wrap: wrap;
  justify-content: center;
  min-height: 16px;
}

.badge-plan {
  background: var(--yellow);
  color: var(--brown);
  font-size: 0.6rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 8px;
  line-height: 1.4;
}

.badge-done {
  background: var(--green);
  color: white;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 8px;
  line-height: 1.4;
}

.block-cell.selected .badge-plan { background: rgba(255,255,255,0.9); }
.block-cell.selected .badge-done { background: rgba(255,255,255,0.3); color: white; border: 1px solid rgba(255,255,255,0.6); }

/* 配置図サークルリスト（コンパクト） */
.map-circle-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.map-circle-row {
  background: white;
  border-radius: 12px;
  padding: 10px 12px;
  box-shadow: 0 2px 8px var(--shadow);
  display: grid;
  grid-template-columns: 52px 1fr auto;
  gap: 10px;
  align-items: center;
  border-left: 4px solid transparent;
  transition: all 0.2s;
}

.map-circle-row.is-plan { border-left-color: var(--yellow); }
.map-circle-row.is-done { border-left-color: var(--green); opacity: 0.75; }

.map-circle-id {
  font-size: 0.78rem;
  font-weight: 900;
  color: white;
  border-radius: 8px;
  padding: 4px 2px;
  text-align: center;
  line-height: 1.2;
}

.map-circle-text .name {
  font-weight: 700;
  font-size: 0.88rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.map-circle-text .rep {
  font-size: 0.73rem;
  color: var(--brown-light);
  margin-top: 1px;
}

.map-circle-text .links-row {
  display: flex;
  gap: 4px;
  margin-top: 3px;
}

.map-circle-btns {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}

.btn-plan {
  min-width: 34px;
  height: 34px;
  border-radius: 9px;
  border: 2px solid var(--warm);
  background: none;
  cursor: pointer;
  font-size: 0.82rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s;
  line-height: 1;
  padding: 0 8px;
}

.btn-plan:hover { border-color: var(--yellow); background: #fffbe6; }
.btn-plan.active { background: var(--yellow); border-color: #e6c200; }

.btn-bought {
  min-width: 34px;
  height: 34px;
  border-radius: 9px;
  border: 2px solid var(--warm);
  background: none;
  cursor: pointer;
  font-size: 0.82rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s;
  padding: 0 8px;
}

.btn-bought:hover { border-color: var(--green); background: #f0fff6; }
.btn-bought.active { background: var(--green); border-color: #2e9e5a; color: white; }

.map-filter-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.map-filter-btn {
  padding: 5px 12px;
  border-radius: 16px;
  border: 2px solid var(--warm);
  background: white;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--brown-light);
  cursor: pointer;
  transition: all 0.18s;
}
.map-filter-btn.active {
  background: var(--orange);
  border-color: var(--orange);
  color: white;
}

.map-block-title {
  font-weight: 900;
  font-size: 1rem;
  margin-bottom: 8px;
  color: var(--brown);
  display: flex;
  align-items: center;
  gap: 8px;
}

.map-block-title .count-summary {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--brown-light);
}

/* お気に入りリスト */
.fav-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.fav-card {
  background: white;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 2px 10px var(--shadow);
  border-left: 4px solid var(--pink);
}

.fav-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.fav-card-header .block-badge {
  background: var(--orange);
  color: white;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
}

.fav-memo {
  background: #F0FFF6;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 0.82rem;
  color: var(--text);
  margin-top: 6px;
  border-left: 3px solid var(--green);
  white-space: pre-wrap;
}

/* APIキー設定 */
.api-key-section {
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 12px var(--shadow);
  margin-bottom: 16px;
}

.api-key-section h3 {
  font-size: 0.9rem;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.api-key-input {
  display: flex;
  gap: 8px;
}

.api-key-input input {
  flex: 1;
  border: 2px solid var(--warm);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}

.api-key-input input:focus { border-color: var(--orange); }

.btn-save {
  background: var(--orange);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 8px 16px;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-save:hover { opacity: 0.85; }

.api-status {
  font-size: 0.8rem;
  margin-top: 6px;
  color: var(--brown-light);
}
.api-status.ok { color: var(--green); }

/* 件数表示 */
.result-count {
  font-size: 0.82rem;
  color: var(--brown-light);
  margin-bottom: 10px;
  padding: 0 4px;
}

/* 空状態 */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--brown-light);
}

.empty-state .emoji { font-size: 3rem; margin-bottom: 8px; }
.empty-state p { font-size: 0.9rem; }

/* スピナー */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* 購入チェックリスト */
.shopping-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.shop-item {
  background: white;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 2px 10px var(--shadow);
  border-left: 4px solid var(--green);
}

.shop-item.done { opacity: 0.5; }
.shop-item.done .shop-memo { text-decoration: line-through; }

.shop-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.shop-item-header .name { font-weight: 700; font-size: 0.95rem; }

.btn-check {
  background: none;
  border: 2px solid var(--warm);
  border-radius: 8px;
  width: 30px;
  height: 30px;
  cursor: pointer;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.btn-check.done { background: var(--green); border-color: var(--green); color: white; }

.shop-memo { font-size: 0.82rem; color: var(--brown-light); margin-top: 4px; }

/* フローティング保存通知 */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--brown);
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  transition: transform 0.3s;
  z-index: 9999;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== 配置図（会場レイアウト再現） ===== */
.venue-block {
  display: inline-flex;
  flex-direction: column;
  background: white;
  border: 1.5px solid #d8ccc0;
  border-radius: 6px;
  overflow: hidden;
  vertical-align: top;
  flex-shrink: 0;
}
.venue-block-header {
  color: white;
  font-weight: 900;
  font-size: 0.75rem;
  padding: 3px 6px;
  text-align: center;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.venue-block-body {
  display: flex;
  flex-direction: row;
}
.venue-col {
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e8ddd0;
}
.venue-col:last-child { border-right: none; }

.vcell {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 2px 3px;
  border-bottom: 1px solid #f0e8e0;
  cursor: pointer;
  min-width: 58px;
  min-height: 22px;
  transition: background 0.12s;
  position: relative;
}
.vcell:last-child { border-bottom: none; }
.vcell:hover { background: #ffe8d0 !important; }
.vcell.is-plan { background: #fff8cc !important; }
.vcell.is-done { background: #ccf0de !important; }
.vcell-num {
  font-size: 0.6rem;
  font-weight: 700;
  color: #8B6355;
  line-height: 1;
}
.vcell-name {
  font-size: 0.65rem;
  font-weight: 600;
  color: #3A2418;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 72px;
}
.vcell-empty {
  background: #f5f0eb;
  cursor: default;
  min-height: 22px;
}
.vcell-empty:hover { background: #f5f0eb !important; }

.venue-sep {
  height: 6px;
  background: #e0d4c8;
  display: flex;
  align-items: center;
  justify-content: center;
}
.venue-sep-line {
  width: 80%;
  height: 1px;
  background: #c8b8a8;
}

/* M列（横並び） */
.venue-m-row {
  display: flex;
  flex-direction: row;
  background: white;
  border: 1.5px solid #d8ccc0;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 4px;
}
.venue-m-header {
  color: white;
  font-weight: 900;
  font-size: 0.72rem;
  padding: 3px 6px;
  writing-mode: vertical-rl;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.venue-m-cells {
  display: flex;
  flex-direction: row;
  overflow-x: auto;
}
.venue-m-cell {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 2px 3px;
  border-right: 1px solid #f0e8e0;
  cursor: pointer;
  min-width: 56px;
  min-height: 34px;
  transition: background 0.12s;
}
.venue-m-cell:hover { background: #ffe8d0; }
.venue-m-cell.is-plan { background: #fff8cc; }
.venue-m-cell.is-done { background: #ccf0de; }

/* エリア区切り */
.venue-area-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: #8B6355;
  padding: 3px 0 1px 2px;
}
.venue-area-row {
  display: flex;
  flex-direction: row;
  gap: 3px;
  align-items: flex-start;
  margin-bottom: 4px;
  flex-wrap: nowrap;
}

/* 搬入口 */
.venue-depot {
  background: #c8b8a8;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: #5C3D2E;
  font-weight: 700;
  writing-mode: vertical-rl;
  min-height: 40px;
  min-width: 16px;
  flex-shrink: 0;
}

/* 入口・本部 */
.venue-entrance {
  background: #e8ddd0;
  border-radius: 6px;
  padding: 4px 3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-around;
  gap: 3px;
  flex-shrink: 0;
}
.venue-entrance-label {
  font-size: 0.58rem;
  font-weight: 700;
  color: #5C3D2E;
  writing-mode: vertical-rl;
  text-orientation: mixed;
}

/* 配置グリッド */
.layout-block-wrap {
  background: white;
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 2px 10px var(--shadow);
  margin-bottom: 10px;
  overflow-x: auto;
}

.layout-block-header {
  font-weight: 900;
  font-size: 0.95rem;
  color: white;
  padding: 5px 10px;
  border-radius: 8px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.layout-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 3px;
  min-width: 280px;
}

/* 上下段をカラムで並べる: 左列=番号小, 右列=番号大 */
.layout-column-pair {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
}

.layout-cell {
  border: 1.5px solid #e8ddd0;
  border-radius: 6px;
  padding: 4px 5px;
  cursor: pointer;
  background: #faf5f0;
  transition: background 0.15s;
  min-width: 0;
  position: relative;
}

.layout-cell:hover { background: #ffe8d0; }
.layout-cell.is-plan { background: #fff8cc; border-color: #e6c200; }
.layout-cell.is-done { background: #ccf0de; border-color: #4CAF7D; }
.layout-cell.is-done .cell-num { text-decoration: line-through; opacity: 0.6; }

.cell-num {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--brown-light);
  line-height: 1.2;
}

.cell-name {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.cell-empty {
  background: #f0e8e0;
  border-color: #d8ccc0;
  cursor: default;
}

.cell-empty:hover { background: #f0e8e0; }

.layout-separator {
  height: 8px;
  background: #e8ddd0;
  border-radius: 4px;
  margin: 4px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: #999;
}

/* M列（横長） */
.layout-m-row {
  display: flex;
  gap: 3px;
  overflow-x: auto;
  padding-bottom: 2px;
}

.layout-m-row .layout-cell {
  flex: 0 0 auto;
  min-width: 80px;
}

/* 全体表示時 */
.all-blocks-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

@media (min-width: 500px) {
  .all-blocks-grid { grid-template-columns: repeat(3, 1fr); }
  .layout-grid { grid-template-columns: repeat(2, 1fr); }
}

/* 会場配置図SVG */
.vblock {
  fill: #f0e8de;
  stroke: #c8b8a8;
  stroke-width: 1.5;
  cursor: pointer;
  transition: fill 0.15s, stroke 0.15s;
}
.vblock:hover {
  fill: #ffe0c0;
  stroke: #FF7A35;
  stroke-width: 2;
}
.vblock.selected {
  fill: #ffcda0;
  stroke: #FF7A35;
  stroke-width: 2.5;
}
.vblock.has-plan {
  fill: #fff8cc;
  stroke: #e6c200;
  stroke-width: 1.5;
}
.vblock.has-done {
  fill: #ccf0de;
  stroke: #4CAF7D;
  stroke-width: 1.5;
}
.vblock.selected { fill: #ffcda0 !important; stroke: #FF7A35 !important; stroke-width: 2.5 !important; }

.vblock-label {
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 28px;
  font-weight: 900;
  fill: #5C3D2E;
  text-anchor: middle;
  pointer-events: none;
  user-select: none;
}
.vblock-sub {
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 8px;
  fill: #8B6355;
  text-anchor: middle;
  pointer-events: none;
  user-select: none;
}

/* 会場配置図 */
.venue-map-wrap {
  position: relative;
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  background: #f5f0ea;
  touch-action: manipulation;
}

.venue-map-img {
  width: 100%;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
}

.venue-map-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  cursor: pointer;
}

.block-overlay {
  fill: transparent;
  stroke: transparent;
  stroke-width: 2;
  transition: fill 0.18s, stroke 0.18s;
  cursor: pointer;
}

.block-overlay:hover {
  fill: rgba(255,122,53,0.18);
  stroke: rgba(255,122,53,0.7);
}

.block-overlay.selected {
  fill: rgba(255,122,53,0.32);
  stroke: #FF7A35;
  stroke-width: 3;
}

.block-overlay.has-plan {
  fill: rgba(255,217,61,0.2);
  stroke: rgba(255,200,0,0.5);
}

.block-overlay.has-done {
  fill: rgba(76,175,125,0.2);
  stroke: rgba(76,175,125,0.5);
}

.block-overlay.selected.has-plan,
.block-overlay.selected.has-done {
  fill: rgba(255,122,53,0.32);
  stroke: #FF7A35;
}

.block-label {
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 22px;
  font-weight: 900;
  fill: rgba(92,61,46,0.5);
  text-anchor: middle;
  pointer-events: none;
  user-select: none;
}

.svg-badge-bg {
  pointer-events: none;
}

.svg-badge-text {
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 11px;
  font-weight: 700;
  pointer-events: none;
  user-select: none;
}
</style>

// =====================
// パース
// =====================
const CIRCLES = CIRCLES_RAW.trim().split('\n').map(line => {
  const [id, name, rep, web, pixiv, x] = line.split(',');
  return { id, name, rep, web: web==='#'?null:web, pixiv: pixiv==='#'?null:pixiv, x: x==='#'?null:x, block: id.split('-')[0] };
});

const BLOCKS = [...new Set(CIRCLES.map(c => c.block))].sort();

// =====================
// 状態
// =====================
let favorites = JSON.parse(localStorage.getItem('kk_favorites') || '{}');
let memos = JSON.parse(localStorage.getItem('kk_memos') || '{}');
let checked = JSON.parse(localStorage.getItem('kk_checked') || '{}');
let plan = JSON.parse(localStorage.getItem('kk_plan') || '{}');
let bought = JSON.parse(localStorage.getItem('kk_bought') || '{}');
let apiKey = localStorage.getItem('kk_apikey') || '';
let currentBlockFilter = 'ALL';
let selectedMapBlock = null;
let openMemos = {};

function save() {
  localStorage.setItem('kk_favorites', JSON.stringify(favorites));
  localStorage.setItem('kk_memos', JSON.stringify(memos));
  localStorage.setItem('kk_checked', JSON.stringify(checked));
  localStorage.setItem('kk_plan', JSON.stringify(plan));
  localStorage.setItem('kk_bought', JSON.stringify(bought));
}

// =====================
// タブ切り替え
// =====================
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  const idx = ['search','map','favorites','shopping','settings'].indexOf(name);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (name === 'favorites') renderFavorites();
  if (name === 'shopping') renderShopping();
  if (name === 'map') { renderMapLayout(); }
  updateCounts();
}

// =====================
// フィルターボタン生成
// =====================
function initFilters() {
  const el = document.getElementById('block-filters');
  BLOCKS.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = b;
    btn.onclick = () => setBlockFilter(b, btn);
    el.appendChild(btn);
  });
}

function setBlockFilter(block, btn) {
  currentBlockFilter = block;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCircles();
}

// =====================
// サークルリスト描画
// =====================
function renderCircles() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  let filtered = CIRCLES.filter(c => {
    const matchBlock = currentBlockFilter === 'ALL' || c.block === currentBlockFilter;
    const matchQuery = !query || c.name.toLowerCase().includes(query) || c.rep.toLowerCase().includes(query) || c.id.toLowerCase().includes(query);
    return matchBlock && matchQuery;
  });
  document.getElementById('result-count').textContent = `${filtered.length} サークル表示中`;
  const el = document.getElementById('circles-list');
  el.innerHTML = filtered.map(c => circleCardHTML(c)).join('');
}

function circleCardHTML(c) {
  const isFav = favorites[c.id];
  const hasMemo = memos[c.id] && memos[c.id].trim();
  const isOpen = openMemos[c.id];
  const blockColors = {A:'#FF7A35',B:'#FF6B9D',C:'#4CAF7D',D:'#667eea',E:'#FFB300',F:'#00BCD4',G:'#9C27B0',H:'#FF5722',I:'#795548',J:'#607D8B',K:'#E91E63',L:'#8BC34A',M:'#FF9800'};
  const color = blockColors[c.block] || '#888';

  const links = [
    c.x ? `<a href="${c.x}" target="_blank" class="link-icon link-x">𝕏</a>` : '',
    c.pixiv ? `<a href="${c.pixiv}" target="_blank" class="link-icon link-pix">P</a>` : '',
    c.web ? `<a href="${c.web}" target="_blank" class="link-icon link-web">🌐</a>` : ''
  ].filter(Boolean).join('');

  return `<div class="circle-card ${isFav?'favorited':''} ${hasMemo?'has-memo':''}" id="card-${c.id}">
    <div class="circle-block" style="background:${color}">${c.id}</div>
    <div class="circle-info">
      <div class="circle-name">${c.name}</div>
      <div class="circle-rep">${c.rep}</div>
      <div class="circle-links">${links}</div>
    </div>
    <div class="circle-actions">
      <button class="btn-fav ${isFav?'active':''}" onclick="toggleFav('${c.id}')" title="お気に入り">♥</button>
      <button class="btn-memo ${hasMemo?'active':''}" onclick="toggleMemo('${c.id}')" title="メモ">📝</button>
    </div>
    ${isOpen ? `<div class="memo-panel open" id="memo-${c.id}">
      <textarea placeholder="頒布物・メモを入力..." oninput="saveMemo('${c.id}', this.value)">${memos[c.id]||''}</textarea>

      <div class="ai-result" id="ai-result-${c.id}" style="display:none"></div>
    </div>` : ''}
  </div>`;
}

function toggleFav(id) {
  favorites[id] = !favorites[id];
  if (!favorites[id]) delete favorites[id];
  save();
  updateCounts();
  // カードだけ再描画
  const c = CIRCLES.find(x => x.id === id);
  const card = document.getElementById(`card-${id}`);
  if (card) card.outerHTML = circleCardHTML(c);
  // お気に入り/配置タブも更新
  showToast(favorites[id] ? '♥ お気に入りに追加しました' : 'お気に入りを解除しました');
}

function toggleMemo(id) {
  openMemos[id] = !openMemos[id];
  const c = CIRCLES.find(x => x.id === id);
  const card = document.getElementById(`card-${id}`);
  if (card) card.outerHTML = circleCardHTML(c);
}

function saveMemo(id, val) {
  if (val.trim()) {
    memos[id] = val;
  } else {
    delete memos[id];
  }
  save();
  updateCounts();
  // カードのメモボタンの色だけ更新
  const btn = document.querySelector(`#card-${id} .btn-memo`);
  if (btn) btn.classList.toggle('active', !!val.trim());
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.toggle('has-memo', !!val.trim());
  }
}

// =====================
// AI機能
// =====================
async function askAI(id) {
  if (!apiKey) {
    showToast('⚙ 設定タブでAPIキーを入力してください');
    return;
  }
  const c = CIRCLES.find(x => x.id === id);
  const btn = document.getElementById(`ai-btn-${id}`);
  const resultEl = document.getElementById(`ai-result-${id}`);
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> 調べています...`;
  resultEl.style.display = 'none';

  const links = [c.x, c.pixiv, c.web].filter(Boolean).join('\n');
  const prompt = `けもケットに参加するサークル「${c.name}」（代表：${c.rep}、配置：${c.id}）について、頒布予定の同人誌・グッズ・作品の情報をできるだけ具体的に教えてください。\n\n参考リンク:\n${links || 'リンク情報なし'}\n\n50〜150字程度で簡潔にまとめてください。不明な場合はその旨を教えてください。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    resultEl.textContent = text || '情報を取得できませんでした。';
    resultEl.style.display = 'block';
    // メモに追記
    const ta = document.querySelector(`#memo-${id} textarea`);
    if (ta && !ta.value) {
      ta.value = text;
      saveMemo(id, text);
    }
  } catch(e) {
    resultEl.textContent = `エラー: ${e.message}`;
    resultEl.style.display = 'block';
  }
  btn.disabled = false;
  btn.innerHTML = '✨ AIに頒布物を調べさせる';
}

const BLOCK_COLORS = {A:'#FF7A35',B:'#FF6B9D',C:'#4CAF7D',D:'#667eea',E:'#FFB300',F:'#00BCD4',G:'#9C27B0',H:'#FF5722',I:'#795548',J:'#607D8B',K:'#E91E63',L:'#8BC34A',M:'#FF9800'};

// サークルデータをブロック×番号で引けるマップを作る
function buildBlockMap() {
  const bmap = {};
  CIRCLES.forEach(c => {
    const [b, n] = c.id.split('-');
    if (!bmap[b]) bmap[b] = {};
    bmap[b][parseInt(n)] = c;
  });
  return bmap;
}

// セルHTML生成
function vcellHTML(circle, small) {
  if (!circle) {
    return `<div class="vcell vcell-empty ${small?'':''}"></div>`;
  }
  const id = circle.id;
  const num = parseInt(id.split('-')[1]);
  const isPlan = plan[id];
  const isDone = bought[id];
  const cls = isDone ? 'is-done' : isPlan ? 'is-plan' : '';
  const icon = isDone ? '✅' : isPlan ? '🎯' : '';
  const shortName = circle.name.length > 7 ? circle.name.slice(0,6)+'…' : circle.name;
  return `<div class="vcell ${cls}" data-id="${id}" onclick="showCellDetail('${id}')">
    <div class="vcell-num">${String(num).padStart(2,'0')}${icon}</div>
    <div class="vcell-name">${shortName}</div>
  </div>`;
}

// ブロック列を生成（上段: 1-18 & 51-68、下段: 19-34 & 35-50）
function blockColsHTML(bmap, block) {
  const color = BLOCK_COLORS[block] || '#888';
  const data = bmap[block] || {};
  // 右列の最大番号を判定
  const hasNums = Object.keys(data).map(Number);
  const rightMax = hasNums.some(n => n > 60) ? 68 : hasNums.some(n => n > 52) ? 60 : 52;

  // 左列上: 1-18、右列上: 51-68(or 60 or 52)
  // 左列下: 19-34、右列下: 35-50
  function makeCol(nums) {
    return nums.map(n => vcellHTML(data[n] || null)).join('');
  }

  const leftUp   = Array.from({length:18}, (_,i) => i+1);
  const rightUp  = Array.from({length: rightMax-50}, (_,i) => i+51);
  const leftDown = Array.from({length:16}, (_,i) => i+19);
  const rightDown= Array.from({length:16}, (_,i) => i+35);

  const planCnt = hasNums.filter(n => plan[block+'-'+String(n).padStart(2,'0')]).length;
  const doneCnt = hasNums.filter(n => bought[block+'-'+String(n).padStart(2,'0')]).length;
  const badge = (planCnt ? `🎯${planCnt} ` : '') + (doneCnt ? `✅${doneCnt}` : '');

  return `<div class="venue-block">
    <div class="venue-block-header" style="background:${color}">${block}${badge ? ' '+badge : ''}</div>
    <div class="venue-block-body">
      <div class="venue-col">
        ${makeCol(leftUp)}
        <div class="venue-sep"><div class="venue-sep-line"></div></div>
        ${makeCol(leftDown)}
      </div>
      <div class="venue-col">
        ${makeCol(rightUp)}
        <div class="venue-sep"><div class="venue-sep-line"></div></div>
        ${makeCol(rightDown)}
      </div>
    </div>
  </div>`;
}

// M列HTML
function mRowHTML(bmap) {
  const data = bmap['M'] || {};
  const nums = Object.keys(data).map(Number).sort((a,b)=>a-b);
  const maxN = nums.length ? Math.max(...nums) : 66;
  const color = BLOCK_COLORS['M'];
  const planCnt = nums.filter(n => plan['M-'+String(n).padStart(2,'0')]).length;
  const doneCnt = nums.filter(n => bought['M-'+String(n).padStart(2,'0')]).length;
  const badge = (planCnt ? `🎯${planCnt} ` : '') + (doneCnt ? `✅${doneCnt}` : '');
  let cells = '';
  for (let i = 1; i <= maxN; i++) {
    const c = data[i];
    if (c) {
      const id = c.id;
      const isPlan = plan[id], isDone = bought[id];
      const cls = isDone ? 'is-done' : isPlan ? 'is-plan' : '';
      const icon = isDone ? '✅' : isPlan ? '🎯' : '';
      const short = c.name.length > 7 ? c.name.slice(0,6)+'…' : c.name;
      cells += `<div class="venue-m-cell ${cls}" onclick="showCellDetail('${id}')">
        <div class="vcell-num">${String(i).padStart(2,'0')}${icon}</div>
        <div class="vcell-name">${short}</div>
      </div>`;
    } else {
      cells += `<div class="venue-m-cell vcell-empty"></div>`;
    }
  }
  return `<div class="venue-m-row">
    <div class="venue-m-header" style="background:${color}">M${badge?'\n'+badge:''}</div>
    <div class="venue-m-cells">${cells}</div>
  </div>`;
}

  const el = document.getElementById('fav-list');
  if (!favCircles.length) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">🐾</div><p>お気に入りがまだありません<br>サークル検索からハートを押してみましょう</p></div>';
    return;
  }
  el.innerHTML = favCircles.map(c => {
    const memo = memos[c.id];
    return `<div class="fav-card">
      <div class="fav-card-header">
        <span style="font-weight:700">${c.name}</span>
        <span class="block-badge">${c.id}</span>
      </div>
      <div style="font-size:0.8rem;color:var(--brown-light)">${c.rep}</div>
      ${memo ? `<div class="fav-memo">${memo}</div>` : ''}
      <div style="display:flex;gap:6px;margin-top:8px">
        ${c.x ? `<a href="${c.x}" target="_blank" class="link-icon link-x">𝕏</a>` : ''}
        ${c.pixiv ? `<a href="${c.pixiv}" target="_blank" class="link-icon link-pix">P</a>` : ''}
        ${c.web ? `<a href="${c.web}" target="_blank" class="link-icon link-web">🌐</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

// =====================
// 買うものリスト
// =====================
function renderShopping() {
  const memoCircles = CIRCLES.filter(c => memos[c.id] && memos[c.id].trim());
  const el = document.getElementById('shopping-list');
  if (!memoCircles.length) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">🛒</div><p>メモがまだありません<br>サークルの📝ボタンからメモを追加しましょう</p></div>';
    return;
  }
  el.innerHTML = memoCircles.map(c => {
    const done = checked[c.id];
    return `<div class="shop-item ${done?'done':''}">
      <div class="shop-item-header">
        <div>
          <div class="name">${c.name} <span style="font-size:0.78rem;color:var(--brown-light);font-weight:400">${c.id}</span></div>
        </div>
        <button class="btn-check ${done?'done':''}" onclick="toggleCheck('${c.id}')">${done?'✓':'○'}</button>
      </div>
      <div class="shop-memo">${memos[c.id]}</div>
    </div>`;
  }).join('');
}

function toggleCheck(id) {
  checked[id] = !checked[id];
  save();
  renderShopping();
}

// =====================
// APIキー
// =====================
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  apiKey = val;
  localStorage.setItem('kk_apikey', val);
  const status = document.getElementById('api-status');
  if (val.startsWith('sk-ant-')) {
    status.textContent = '✓ APIキーが保存されました';
    status.className = 'api-status ok';
  } else if (val) {
    status.textContent = '⚠ 形式が正しくない可能性があります（sk-ant-... で始まるはずです）';
    status.className = 'api-status';
  } else {
    status.textContent = 'APIキーが削除されました';
    status.className = 'api-status';
  }
  showToast('設定を保存しました');
}

// =====================
// ユーティリティ
// =====================
function updateCounts() {
  document.getElementById('fav-count').textContent = Object.keys(favorites).length;
  document.getElementById('memo-count').textContent = Object.keys(memos).length;
  document.getElementById('bought-count').textContent = Object.keys(bought).length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// =====================
// 初期化
// =====================
initFilters();
renderCircles();
updateCounts();


// 設定タブのAPIキー表示
if (apiKey) {
  document.getElementById('api-key-input').value = apiKey;
  document.getElementById('api-status').textContent = '✓ APIキーが設定されています';
  document.getElementById('api-status').className = 'api-status ok';
}
</script>

<div id="img-zoom-overlay" onclick="closeZoom()" style="display:none;position:fixed;inset:0;background:#000;z-index:9998;align-items:center;justify-content:center;cursor:zoom-out">
  <img id="img-zoom-large" style="max-width:100%;max-height:100%;object-fit:contain">
  <div style="position:absolute;top:12px;right:12px;color:white;font-size:1.5rem;cursor:pointer" onclick="closeZoom()">✕</div>
</div>

<script>
// ===== 配置図ズーム（オーバーレイ方式） =====
function toggleMapZoom(img) {
  const overlay = document.getElementById('img-zoom-overlay');
  const large = document.getElementById('img-zoom-large');
  large.src = img.src;
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeZoom() {
  document.getElementById('img-zoom-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
</script>
